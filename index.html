<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="在线简历生成器 - 输入个人信息自动生成专业简历，支持在线预览和PDF下载" />
  <title>简历生成器 | Resume Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- PDF 导出依赖 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="top-bar" id="topBar">
    <div class="top-bar__left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#818cf8" />
              <stop offset="100%" style="stop-color:#6ee7b7" />
            </linearGradient>
          </defs>
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span class="logo__text">简历生成器</span>
      </div>
    </div>
    <div class="top-bar__center">
      <button class="template-btn active" data-template="classic" id="btnTemplateClassic">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
        经典双栏
      </button>
      <button class="template-btn" data-template="modern" id="btnTemplateModern">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        现代简约
      </button>
    </div>
    <div class="top-bar__right">
      <button class="btn btn--outline" id="btnPreview">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        预览
      </button>
      <button class="btn btn--primary" id="btnDownload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载 PDF
      </button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-layout" id="mainLayout">
    <!-- 左侧：编辑表单 -->
    <aside class="editor-panel" id="editorPanel">
      <!-- 个人信息 -->
      <section class="form-card" id="sectionPersonal">
        <div class="form-card__header" data-toggle="personalBody">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            个人信息
          </h2>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="form-card__body" id="personalBody">
          <div class="form-row form-row--2col">
            <div class="form-group">
              <label for="inputName">姓名 <span class="required">*</span></label>
              <input type="text" id="inputName" placeholder="张三" />
            </div>
            <div class="form-group">
              <label for="inputGender">性别</label>
              <select id="inputGender">
                <option value="male">男</option>
                <option value="female">女</option>
                <option value="other">其他</option>
              </select>
            </div>
          </div>
          <div class="form-row form-row--2col">
            <div class="form-group">
              <label for="inputEmail">邮箱 <span class="required">*</span></label>
              <input type="email" id="inputEmail" placeholder="example@email.com" />
            </div>
            <div class="form-group">
              <label for="inputPhone">手机</label>
              <input type="tel" id="inputPhone" placeholder="138-0000-0000" />
            </div>
          </div>
          <div class="form-group">
            <label for="inputLocation">所在地</label>
            <input type="text" id="inputLocation" placeholder="上海市" />
          </div>
          <div class="form-group">
            <label for="inputSummary">个人简介</label>
            <textarea id="inputSummary" rows="3" placeholder="简要描述你的专业背景和职业目标..."></textarea>
          </div>
        </div>
      </section>

      <!-- 工作经历 -->
      <section class="form-card" id="sectionWork">
        <div class="form-card__header" data-toggle="workBody">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            工作经历
          </h2>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="form-card__body" id="workBody">
          <div id="workList"></div>
          <button class="btn btn--add" id="btnAddWork">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            添加工作经历
          </button>
        </div>
      </section>

      <!-- 教育背景 -->
      <section class="form-card" id="sectionEducation">
        <div class="form-card__header" data-toggle="educationBody">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 4 3 6 3s6-1 6-3v-5"/></svg>
            教育背景
          </h2>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="form-card__body" id="educationBody">
          <div id="educationList"></div>
          <button class="btn btn--add" id="btnAddEducation">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            添加教育背景
          </button>
        </div>
      </section>

      <!-- 技能标签 -->
      <section class="form-card" id="sectionSkills">
        <div class="form-card__header" data-toggle="skillsBody">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            专业技能
          </h2>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="form-card__body" id="skillsBody">
          <div class="skills-input-wrap">
            <input type="text" id="inputSkill" placeholder="输入技能，按回车添加" />
            <button class="btn btn--icon" id="btnAddSkill" title="添加技能">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div class="skills-tags" id="skillsTags"></div>
        </div>
      </section>
    </aside>

    <!-- 拖拽分隔条 -->
    <div class="resize-handle" id="resizeHandle">
      <div class="resize-handle__line"></div>
    </div>

    <!-- 右侧：简历预览 -->
    <section class="preview-panel" id="previewPanel">
      <div class="preview-paper" id="resumePreview">
        <!-- 简历内容由 JS 渲染 -->
      </div>
    </section>
  </main>

  <!-- 全屏预览遮罩 -->
  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-overlay__toolbar">
      <span>简历预览</span>
      <button class="btn btn--outline" id="btnClosePreview">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        关闭
      </button>
    </div>
    <div class="preview-overlay__content">
      <div class="preview-paper preview-paper--fullscreen" id="resumePreviewFull"></div>
    </div>
  </div>

  <!-- 下载中提示 -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
